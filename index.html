<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Tabungan Betuah Bank Kalbar Cabang Sambas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }
        body { background-color: #e0f2f1; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .calculator-body {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 10px 10px 0px #00796b; /* Hijau Tua */
            border: 4px solid #004d40;
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px dashed #b2dfdb; padding-bottom: 15px; }
        .header h2 { color: #004d40; font-size: 18px; text-transform: uppercase; line-height: 1.4; }

        /* Selector Tenor */
        .tenor-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: 15px;
            border: 2px solid #0288d1; /* Biru */
            background: #e1f5fe;
            cursor: pointer;
            font-weight: bold;
            color: #01579b;
            transition: 0.2s;
            box-shadow: 0px 4px 0px #0288d1;
        }
        .tab-btn.active {
            background: #0288d1;
            color: white;
            top: 4px;
            box-shadow: 0px 0px 0px;
        }

        .display-container {
            background-color: #f1f8e9; /* Hijau Pucat */
            margin-bottom: 20px;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid #a5d6a7;
            text-align: center;
        }

        .label-text { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .value-text { font-size: 22px; font-weight: bold; color: #2e7d32; margin: 5px 0; }
        .result-label { color: #01579b; margin-top: 10px; }
        .jasa-text { color: #c2185b; font-size: 26px; }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            max-height: 350px;
            overflow-y: auto; 
            padding-right: 8px;
        }

        .btn-simpanan {
            background-color: #ffffff;
            border: 2px solid #4caf50;
            padding: 15px 10px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            color: #2e7d32;
            cursor: pointer;
            box-shadow: 0px 5px 0px #388e3c;
            position: relative;
            top: 0;
            transition: all 0.1s;
        }

        .btn-simpanan:active { top: 4px; box-shadow: 0px 1px 0px #388e3c; }
        .btn-simpanan span { display: block; font-size: 9px; color: #666; font-weight: normal; }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4caf50; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="calculator-body">
        <div class="header">
            <h2>KALKULATOR TABUNGAN BETUAH<br>BANK KALBAR CABANG SAMBAS</h2>
        </div>

        <div class="tenor-selector">
            <button id="btn6" class="tab-btn active" onclick="setTenor(6)">6 BULAN</button>
            <button id="btn12" class="tab-btn" onclick="setTenor(12)">12 BULAN</button>
        </div>
        
        <div class="display-container">
            <div class="label-text">Simpanan Pokok</div>
            <div id="dispSimpanan" class="value-text">Rp 0</div>
            <div class="label-text result-label">Estimasi Hasil Investasi (<span id="txtTenor">6</span> Bln)</div>
            <div id="dispJasa" class="value-text jasa-text">Rp 0</div>
        </div>

        <div class="grid-container" id="buttonGrid"></div>
    </div>

    <script>
        let currentTenor = 6;
        
        // DATA INVESTASI SESUAI INPUT USER
        const dataInvestasi = {
            6: {
                10000000: 151890.41, 15000000: 227835.62, 20000000: 303780.82,
                25000000: 379726.03, 50000000: 759452.05, 75000000: 1109589.04,
                100000000: 1479452.05, 200000000: 2958904.11, 250000000: 3698630.14,
                500000000: 6904109.59, 750000000: 9616438.36, 1000000000: 12821917.81,
                1500000000: 16273972.60, 2000000000: 21698630.14, 5000000000: 54246575.34
            },
            12: {
                10000000: 303780.82, 15000000: 455671.23, 20000000: 607561.64,
                25000000: 759452.05, 50000000: 1518904.11, 75000000: 2219178.08,
                100000000: 2958904.11, 200000000: 5917808.22, 250000000: 7397260.27,
                500000000: 13808219.18, 750000000: 19232876.71, 1000000000: 25643835.62,
                1500000000: 32547945.21, 2000000000: 43397260.27, 5000000000: 108493150.68
            }
        };

        const formatter = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 2 });

        function setTenor(t) {
            currentTenor = t;
            document.getElementById('txtTenor').innerText = t;
            
            // Toggle Button UI
            document.getElementById('btn6').classList.toggle('active', t === 6);
            document.getElementById('btn12').classList.toggle('active', t === 12);
            
            renderButtons();
            updateSimulasi(0);
        }

        function updateSimulasi(jumlah) {
            const hasil = dataInvestasi[currentTenor][jumlah] || 0;
            document.getElementById('dispSimpanan').innerText = formatter.format(jumlah);
            document.getElementById('dispJasa').innerText = formatter.format(hasil);
        }

        function renderButtons() {
            const grid = document.getElementById('buttonGrid');
            grid.innerHTML = '';
            
            // Mengambil nominal dari data 6 bulan sebagai referensi tombol
            const nominals = Object.keys(dataInvestasi[6]).map(Number);
            
            nominals.sort((a, b) => a - b).forEach(nilai => {
                const btn = document.createElement('button');
                btn.className = 'btn-simpanan';
                
                let textLabel = "";
                if(nilai >= 1000000000) {
                    textLabel = (nilai/1000000000) + " MILYAR";
                } else {
                    textLabel = (nilai/1000000) + " JUTA";
                }
                
                btn.innerHTML = textLabel + " <span>Klik Simulasi</span>";
                btn.onclick = () => updateSimulasi(nilai);
                grid.appendChild(btn);
            });
        }

        // Jalankan saat pertama buka
        renderButtons();
    </script>
</body>
</html>
