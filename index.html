<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Tabungan Betuah Bank Kalbar</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial Rounded MT Bold', Arial, sans-serif; }
        body { background-color: #e8f5e9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .calculator-body {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 10px 10px 0px #66bb6a; /* Bayangan hijau kontras */
            border: 4px solid #4caf50;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: #2e7d32; font-size: 20px; line-height: 1.2; }

        .display-container {
            background-color: #f1f8e9;
            margin-bottom: 20px;
            border-radius: 20px;
            padding: 20px;
            border: 3px solid #c8e6c9;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05);
        }

        .label-text { font-size: 13px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .value-text { font-size: 26px; font-weight: bold; color: #2e7d32; margin-top: 5px; }
        .jasa-text { color: #d81b60; font-size: 30px; }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

        .btn-simpanan {
            background-color: #fff9c4; /* Kuning Pastel */
            border: 3px solid #fbc02d;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #444;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0px 5px 0px #fbc02d;
            position: relative;
            top: 0;
        }

        .btn-simpanan:active { top: 4px; box-shadow: 0px 1px 0px #fbc02d; }
        .btn-simpanan span { display: block; font-size: 10px; color: #795548; font-weight: normal; }

        .footer { margin-top: 20px; text-align: center; font-size: 11px; color: #888; }
    </style>
</head>
<body>

    <div class="calculator-body">
        <div class="header">
            <h2>SIMULASI TABUNGAN<br>BETUAH BANK KALBAR</h2>
        </div>
        
        <div class="display-container">
            <div class="label-text">Jumlah Simpanan:</div>
            <div id="dispSimpanan" class="value-text">Rp 0</div>
            <hr style="margin: 15px 0; border: 1px dashed #c8e6c9;">
            <div class="label-text">Estimasi Jasa:</div>
            <div id="dispJasa" class="value-text jasa-text">Rp 0</div>
        </div>

        <div class="grid-container" id="buttonGrid"></div>

        <div class="footer">
            *Nilai di atas adalah simulasi kelipatan 15%
        </div>
    </div>

    <script>
        const buttonGrid = document.getElementById('buttonGrid');
        const formatter = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });

        function updateSimulasi(jumlah) {
            const jasa = jumlah * 0.15;
            document.getElementById('dispSimpanan').innerText = formatter.format(jumlah);
            document.getElementById('dispJasa').innerText = formatter.format(jasa);
        }

        // Generate tombol 100rb - 1jt
        for (let i = 1; i <= 10; i++) {
            const nilai = i * 100000;
            const btn = document.createElement('button');
            btn.className = 'btn-simpanan';
            btn.innerHTML = (nilai/1000).toLocaleString() + " RB <span>Klik Simulasi</span>";
            btn.onclick = () => updateSimulasi(nilai);
            buttonGrid.appendChild(btn);
        }
    </script>
</body>
</html>
